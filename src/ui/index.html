<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000" id="theme-color-meta">
<title>Usage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@400..700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/apexcharts@4/dist/apexcharts.min.js"></script>
<style>
/* __STYLE_CSS__ */
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="header-mount"></div>
<div id="filter-bar-mount"></div>
<div id="inline-status-global" style="max-width:1400px;margin:12px auto 0;padding:0 24px"></div>

<main id="main-content" class="bento" tabindex="-1">
  <!-- Rate windows (conditional) -->
  <div id="usage-windows" class="bento-full" style="display:none;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px"></div>
  <div id="claude-usage" class="bento-full" style="display:none"></div>
  <!-- Agent status (upstream provider health) -->
  <div id="agent-status" class="bento-full" style="display:none;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px"></div>
  <div id="estimation-meta" class="bento-full" style="display:none;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px"></div>
  <div id="openai-reconciliation" class="bento-full" style="display:none"></div>

  <!-- Stat cards -->
  <div id="stats-row" class="bento-full" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px"></div>

  <!-- Charts row -->
  <div class="card bento-2 chart-card">
    <h2 id="daily-chart-title">Daily Token Usage</h2>
    <div class="chart-wrap tall"><div id="chart-daily"></div></div>
  </div>
  <div class="card chart-card">
    <h2>By Model</h2>
    <div class="chart-wrap"><div id="chart-model"></div></div>
  </div>
  <div class="card chart-card">
    <h2>Top Projects</h2>
    <div class="chart-wrap"><div id="chart-project"></div></div>
  </div>

  <!-- Data sections -->
  <div class="card card-flat bento-full table-card" id="subagent-summary" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="entrypoint-breakdown" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="service-tiers" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="tool-summary" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="mcp-summary" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="branch-summary" style="display:none"></div>
  <div class="card card-flat bento-2 table-card" id="version-summary" style="display:none"></div>
  <div class="card card-flat bento-2" id="hourly-chart" style="display:none"></div>
  <div class="card card-flat bento-full table-card" id="activity-heatmap" style="display:none"></div>

  <!-- Phase 8: Cost reconciliation panel (hidden when no hook costs recorded) -->
  <div class="bento-full" id="cost-reconciliation" style="display:none"></div>

  <!-- Tables -->
  <div class="bento-full" id="model-cost-mount"></div>
  <div class="bento-full" id="sessions-mount"></div>
  <div class="bento-full" id="project-cost-mount"></div>

  <!-- Codex is now expressed via the Provider segmented filter in the top filter bar. -->
</main>

<footer role="contentinfo">
  <div class="footer-content">
    <p>Cost estimates are based on <a href="https://docs.anthropic.com/en/docs/about-claude/pricing" target="_blank">Anthropic pricing</a> and <a href="https://developers.openai.com/api/docs/pricing" target="_blank">OpenAI pricing</a>. Local dashboard totals are estimates, not subscriber billing statements.</p>
    <p><a href="https://github.com/po4yka/claude-usage-tracker" target="_blank">GitHub</a> &middot; MIT License</p>
  </div>
</footer>

<script>
/* __APP_JS__ */
</script>
</body>
</html>
