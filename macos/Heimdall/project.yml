name: Heimdall
schemes:
  HeimdallModules:
    build:
      targets:
        HeimdallDomain: all
        HeimdallServices: all
        HeimdallPlatformMac: all
        HeimdallAppUI: all
        HeimdallWidgets: all
        HeimdallCLI: all
    test:
      targets:
        - HeimdallModuleTests
  HeimdallApp:
    build:
      targets:
        HeimdallApp: all
    test:
      targets:
        - HeimdallModuleTests
  HeimdallMobileApp:
    build:
      targets:
        HeimdallMobileApp: all
    test:
      targets:
        - HeimdallMobileTests
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
targets:
  HeimdallDomain:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Domain/Sources
    preBuildScripts:
      - name: Validate Domain Boundaries
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/validate_module_boundaries.sh" "$SRCROOT/Domain/Sources" "HeimdallDomain"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallDomain
        PRODUCT_NAME: HeimdallDomain
        GENERATE_INFOPLIST_FILE: YES
  HeimdallServices:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Services/Sources
    preBuildScripts:
      - name: Validate Services Boundaries
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/validate_module_boundaries.sh" "$SRCROOT/Services/Sources" "HeimdallServices"
    dependencies:
      - target: HeimdallDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallServices
        PRODUCT_NAME: HeimdallServices
        GENERATE_INFOPLIST_FILE: YES
  HeimdallPlatformMac:
    type: framework
    platform: macOS
    sources:
      - path: PlatformMac/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallPlatformMac
        PRODUCT_NAME: HeimdallPlatformMac
        GENERATE_INFOPLIST_FILE: YES
  HeimdallAppUI:
    type: framework
    platform: macOS
    sources:
      - path: AppUI/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallAppUI
        PRODUCT_NAME: HeimdallAppUI
        GENERATE_INFOPLIST_FILE: YES
  HeimdallWidgets:
    type: framework
    platform: macOS
    sources:
      - path: Widgets/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallWidgets
        PRODUCT_NAME: HeimdallWidgets
        GENERATE_INFOPLIST_FILE: YES
  HeimdallCLI:
    type: framework
    platform: macOS
    sources:
      - path: CLIFramework/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallCLI
        PRODUCT_NAME: HeimdallCLI
        GENERATE_INFOPLIST_FILE: YES
  HeimdallApp:
    type: application
    platform: macOS
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CKSharingSupported: true
    # NOTE: iCloud + app-groups entitlements removed for Personal Team / "Sign
    # to Run Locally" signing. Restore once an Apple Developer Program team
    # is in place (paid tier required for these capabilities).
    sources:
      - path: App/Sources
      - path: CloudSync/Sources
      - path: App/AppIcon.icon
        buildPhase: resources
      - path: App/Assets.xcassets
        buildPhase: resources
    postBuildScripts:
      - name: Bundle Heimdall helper
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/../../script/bundle_heimdall_helper.sh" "$TARGET_BUILD_DIR/$WRAPPER_NAME" "$CONFIGURATION"
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
      - target: HeimdallPlatformMac
        embed: true
      - target: HeimdallAppUI
        embed: true
      - target: HeimdallWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall
        PRODUCT_NAME: Heimdall
        INFOPLIST_KEY_LSUIElement: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallWidget:
    type: app-extension
    platform: macOS
    info:
      path: Widget/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    # NOTE: app-groups entitlement removed for Personal Team signing. Restore
    # once on an Apple Developer Program team.
    sources:
      - path: Widget/Sources
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
      - target: HeimdallWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.widget
        PRODUCT_NAME: HeimdallWidget
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallTool:
    type: tool
    platform: macOS
    sources:
      - path: CLI/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallPlatformMac
      - target: HeimdallCLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.cli
        PRODUCT_NAME: heimdall
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path @loader_path @loader_path/../Frameworks"
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallModuleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SharedTests
      - path: CloudSync/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallPlatformMac
      - target: HeimdallAppUI
      - target: HeimdallWidgets
      - target: HeimdallCLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallModuleTests
        PRODUCT_NAME: HeimdallModuleTests
        GENERATE_INFOPLIST_FILE: YES
  HeimdallMobileApp:
    type: application
    platform: iOS
    info:
      path: iOS/App/Info.plist
      properties:
        CKSharingSupported: true
        UIBackgroundModes:
          - remote-notification
    # NOTE: iCloud + app-groups entitlements removed for Personal Team signing.
    # Restore once on an Apple Developer Program team.
    sources:
      - path: iOS/App/Sources
      - path: CloudSync/Sources
      - path: iOS/App/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallMobile
        PRODUCT_NAME: HeimdallMobileApp
  HeimdallMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/iOSTests
      - path: CloudSync/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallMobileApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.po4yka.heimdall.HeimdallMobileTests
        PRODUCT_NAME: HeimdallMobileTests
        GENERATE_INFOPLIST_FILE: YES
