name: HeimdallBar
schemes:
  HeimdallBarModules:
    build:
      targets:
        HeimdallDomain: all
        HeimdallServices: all
        HeimdallPlatformMac: all
        HeimdallAppUI: all
        HeimdallWidgets: all
        HeimdallCLI: all
    test:
      targets:
        - HeimdallBarModuleTests
  HeimdallBarApp:
    build:
      targets:
        HeimdallBarApp: all
    test:
      targets:
        - HeimdallBarModuleTests
  HeimdallMobileApp:
    build:
      targets:
        HeimdallMobileApp: all
    test:
      targets:
        - HeimdallMobileTests
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
targets:
  HeimdallDomain:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Domain/Sources
    preBuildScripts:
      - name: Validate Domain Boundaries
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/validate_module_boundaries.sh" "$SRCROOT/Domain/Sources" "HeimdallDomain"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallDomain
        PRODUCT_NAME: HeimdallDomain
        GENERATE_INFOPLIST_FILE: YES
  HeimdallServices:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Services/Sources
    preBuildScripts:
      - name: Validate Services Boundaries
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/validate_module_boundaries.sh" "$SRCROOT/Services/Sources" "HeimdallServices"
    dependencies:
      - target: HeimdallDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallServices
        PRODUCT_NAME: HeimdallServices
        GENERATE_INFOPLIST_FILE: YES
  HeimdallPlatformMac:
    type: framework
    platform: macOS
    sources:
      - path: PlatformMac/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallPlatformMac
        PRODUCT_NAME: HeimdallPlatformMac
        GENERATE_INFOPLIST_FILE: YES
  HeimdallAppUI:
    type: framework
    platform: macOS
    sources:
      - path: AppUI/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallAppUI
        PRODUCT_NAME: HeimdallAppUI
        GENERATE_INFOPLIST_FILE: YES
  HeimdallWidgets:
    type: framework
    platform: macOS
    sources:
      - path: Widgets/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallWidgets
        PRODUCT_NAME: HeimdallWidgets
        GENERATE_INFOPLIST_FILE: YES
  HeimdallCLI:
    type: framework
    platform: macOS
    sources:
      - path: CLIFramework/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallCLI
        PRODUCT_NAME: HeimdallCLI
        GENERATE_INFOPLIST_FILE: YES
  HeimdallBarApp:
    type: application
    platform: macOS
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      path: App/HeimdallBar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.heimdall.heimdallbar
        com.apple.developer.icloud-container-identifiers:
          - iCloud.dev.heimdall.heimdallbar
        com.apple.developer.icloud-services:
          - CloudKit
    sources:
      - path: App/Sources
    postBuildScripts:
      - name: Bundle Heimdall helper
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/../../script/bundle_heimdall_helper.sh" "$TARGET_BUILD_DIR/$WRAPPER_NAME" "$CONFIGURATION"
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
      - target: HeimdallPlatformMac
        embed: true
      - target: HeimdallAppUI
        embed: true
      - target: HeimdallBarWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallBar
        PRODUCT_NAME: HeimdallBar
        INFOPLIST_KEY_LSUIElement: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallBarWidget:
    type: app-extension
    platform: macOS
    info:
      path: Widget/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      path: Widget/HeimdallBarWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.heimdall.heimdallbar
    sources:
      - path: Widget/Sources
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
      - target: HeimdallWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallBar.widget
        PRODUCT_NAME: HeimdallBarWidget
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallBarCLI:
    type: tool
    platform: macOS
    sources:
      - path: CLI/Sources
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallPlatformMac
      - target: HeimdallCLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallBar.cli
        PRODUCT_NAME: heimdallbar
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path @loader_path @loader_path/../Frameworks"
      configs:
        Release:
          ENABLE_HARDENED_RUNTIME: YES
  HeimdallBarModuleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SharedTests
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallPlatformMac
      - target: HeimdallAppUI
      - target: HeimdallWidgets
      - target: HeimdallCLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallBarModuleTests
        PRODUCT_NAME: HeimdallBarModuleTests
        GENERATE_INFOPLIST_FILE: YES
  HeimdallMobileApp:
    type: application
    platform: iOS
    entitlements:
      path: iOS/App/HeimdallMobile.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.dev.heimdall.heimdallbar
        com.apple.developer.icloud-services:
          - CloudKit
    sources:
      - path: iOS/App/Sources
    dependencies:
      - target: HeimdallDomain
        embed: true
      - target: HeimdallServices
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallMobile
        PRODUCT_NAME: HeimdallMobileApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Heimdall
  HeimdallMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/iOSTests
    dependencies:
      - target: HeimdallDomain
      - target: HeimdallServices
      - target: HeimdallMobileApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.heimdall.HeimdallMobileTests
        PRODUCT_NAME: HeimdallMobileTests
        GENERATE_INFOPLIST_FILE: YES
