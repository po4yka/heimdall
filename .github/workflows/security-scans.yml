name: security-scans

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/security-scans.yml'
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/security-scans.yml'
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scanner:
    name: osv-scanner
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./

  npm-audit:
    name: npm-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies (lockfile-only)
        run: npm ci --ignore-scripts

      - name: npm audit (production deps, fail on high)
        run: npm audit --audit-level=high --omit=dev

      - name: npm audit (full tree, fail on critical)
        run: npm audit --audit-level=critical

      - name: npm audit signatures
        continue-on-error: true
        run: npm audit signatures
