name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux arm64 only)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binaries (native)
        if: "!matrix.use_cross"
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin claude-usage-tracker \
            --bin heimdall-hook

      - name: Build binaries (cross)
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }} \
            --bin claude-usage-tracker \
            --bin heimdall-hook

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARGET=${{ matrix.target }}
          ARCHIVE_NAME="heimdall-${VERSION}-${TARGET}.tar.gz"
          STAGING_DIR="heimdall-${VERSION}-${TARGET}"

          mkdir -p "${STAGING_DIR}"
          cp "target/${TARGET}/release/claude-usage-tracker" "${STAGING_DIR}/"
          cp "target/${TARGET}/release/heimdall-hook" "${STAGING_DIR}/"

          tar czf "${ARCHIVE_NAME}" "${STAGING_DIR}"

          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $TARGET = "${{ matrix.target }}"
          $ARCHIVE_NAME = "heimdall-${VERSION}-${TARGET}.zip"
          $STAGING_DIR = "heimdall-${VERSION}-${TARGET}"

          New-Item -ItemType Directory -Force -Path $STAGING_DIR | Out-Null
          Copy-Item "target\${TARGET}\release\claude-usage-tracker.exe" "$STAGING_DIR\"
          Copy-Item "target\${TARGET}\release\heimdall-hook.exe" "$STAGING_DIR\"

          Compress-Archive -Path $STAGING_DIR -DestinationPath $ARCHIVE_NAME

          $hash = (Get-FileHash $ARCHIVE_NAME -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE_NAME" | Out-File -FilePath "${ARCHIVE_NAME}.sha256" -Encoding ascii

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          if [ -f CHANGELOG.md ]; then
            VERSION=${{ steps.version.outputs.version }}
            # Extract the section for this version (between first and second "## [" markers)
            NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
            if [ -n "$NOTES" ]; then
              echo "body<<EOF" >> "$GITHUB_OUTPUT"
              echo "$NOTES" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  macos-app:
    name: Build HeimdallBar macOS app
    runs-on: macos-latest
    env:
      HEIMDALL_CODESIGN_IDENTITY: ${{ secrets.HEIMDALL_CODESIGN_IDENTITY }}
      HEIMDALL_APPLE_CERTIFICATE_BASE64: ${{ secrets.HEIMDALL_APPLE_CERTIFICATE_BASE64 }}
      HEIMDALL_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.HEIMDALL_APPLE_CERTIFICATE_PASSWORD }}
      HEIMDALL_NOTARY_APPLE_ID: ${{ secrets.HEIMDALL_NOTARY_APPLE_ID }}
      HEIMDALL_NOTARY_TEAM_ID: ${{ secrets.HEIMDALL_NOTARY_TEAM_ID }}
      HEIMDALL_NOTARY_APP_PASSWORD: ${{ secrets.HEIMDALL_NOTARY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: macos-app-helper

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Prepare Apple signing keychain
        if: ${{ env.HEIMDALL_APPLE_CERTIFICATE_BASE64 != '' && env.HEIMDALL_APPLE_CERTIFICATE_PASSWORD != '' && env.HEIMDALL_CODESIGN_IDENTITY != '' }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/heimdallbar-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/heimdallbar-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 18)"
          EXISTING_KEYCHAINS=$(security list-keychains -d user | sed 's/^[[:space:]]*//; s/"//g')

          echo "$HEIMDALL_APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$HEIMDALL_APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "HEIMDALL_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "HEIMDALL_SIGNING_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Generate HeimdallBar project
        shell: bash
        run: |
          cd macos/HeimdallBar
          xcodegen generate --use-cache

      - name: Build HeimdallBar app
        shell: bash
        run: |
          xcodebuild \
            -project macos/HeimdallBar/HeimdallBar.xcodeproj \
            -scheme HeimdallBarApp \
            -configuration Release \
            -derivedDataPath macos/HeimdallBar/.derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build HeimdallBar CLI
        shell: bash
        run: |
          xcodebuild \
            -project macos/HeimdallBar/HeimdallBar.xcodeproj \
            -scheme HeimdallBarCLI \
            -configuration Release \
            -derivedDataPath macos/HeimdallBar/.derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stage HeimdallBar distribution
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          STAGING_DIR="heimdallbar-${VERSION}-macos-app"
          ./script/package_heimdallbar_distribution.sh "macos/HeimdallBar/.derived/Build/Products/Release" "${STAGING_DIR}"
          echo "STAGING_DIR=${STAGING_DIR}" >> "$GITHUB_ENV"

      - name: Sign HeimdallBar distribution
        shell: bash
        run: |
          IDENTITY="${HEIMDALL_CODESIGN_IDENTITY:--}"
          ./script/sign_heimdallbar_distribution.sh \
            "${STAGING_DIR}/HeimdallBar.app" \
            "${STAGING_DIR}/bin/heimdallbar" \
            "$IDENTITY"

      - name: Notarize HeimdallBar app bundle
        if: ${{ env.HEIMDALL_CODESIGN_IDENTITY != '' && env.HEIMDALL_NOTARY_APPLE_ID != '' && env.HEIMDALL_NOTARY_TEAM_ID != '' && env.HEIMDALL_NOTARY_APP_PASSWORD != '' }}
        shell: bash
        run: |
          NOTARY_ARCHIVE="$RUNNER_TEMP/heimdallbar-notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "${STAGING_DIR}" "$NOTARY_ARCHIVE"

          xcrun notarytool submit "$NOTARY_ARCHIVE" \
            --apple-id "$HEIMDALL_NOTARY_APPLE_ID" \
            --team-id "$HEIMDALL_NOTARY_TEAM_ID" \
            --password "$HEIMDALL_NOTARY_APP_PASSWORD" \
            --wait

          xcrun stapler staple "${STAGING_DIR}/HeimdallBar.app"

      - name: Validate HeimdallBar distribution
        shell: bash
        run: |
          if [[ -n "$HEIMDALL_CODESIGN_IDENTITY" && -n "$HEIMDALL_NOTARY_APPLE_ID" && -n "$HEIMDALL_NOTARY_TEAM_ID" && -n "$HEIMDALL_NOTARY_APP_PASSWORD" ]]; then
            HEIMDALL_REQUIRE_STAPLE=1 ./script/validate_heimdallbar_distribution.sh "${STAGING_DIR}"
          else
            ./script/validate_heimdallbar_distribution.sh "${STAGING_DIR}"
          fi

      - name: Package HeimdallBar app artifact
        shell: bash
        run: |
          ARCHIVE_NAME="${STAGING_DIR}.zip"

          ditto -c -k --sequesterRsrc --keepParent "${STAGING_DIR}" "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload HeimdallBar app artifact
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256

      - name: Cleanup Apple signing keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${HEIMDALL_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$HEIMDALL_SIGNING_KEYCHAIN" || true
          fi

  macos-universal:
    name: Build macOS universal binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download aarch64 tarball
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05  # v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "heimdall-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
          out-file-path: "dl-arm64"

      - name: Download x86_64 tarball
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05  # v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "heimdall-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz"
          out-file-path: "dl-x86"

      - name: Unpack both tarballs
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar xzf "dl-arm64/heimdall-${VERSION}-aarch64-apple-darwin.tar.gz"
          tar xzf "dl-x86/heimdall-${VERSION}-x86_64-apple-darwin.tar.gz"

      - name: Merge with lipo
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARM_DIR="heimdall-${VERSION}-aarch64-apple-darwin"
          X86_DIR="heimdall-${VERSION}-x86_64-apple-darwin"
          STAGING_DIR="heimdall-${VERSION}-universal-apple-darwin"

          mkdir -p "${STAGING_DIR}"

          lipo -create \
            "${ARM_DIR}/claude-usage-tracker" \
            "${X86_DIR}/claude-usage-tracker" \
            -output "${STAGING_DIR}/claude-usage-tracker"

          lipo -create \
            "${ARM_DIR}/heimdall-hook" \
            "${X86_DIR}/heimdall-hook" \
            -output "${STAGING_DIR}/heimdall-hook"

          echo "=== lipo -info claude-usage-tracker ==="
          lipo -info "${STAGING_DIR}/claude-usage-tracker"
          echo "=== lipo -info heimdall-hook ==="
          lipo -info "${STAGING_DIR}/heimdall-hook"

          # Verify both architectures are present in each binary.
          lipo -info "${STAGING_DIR}/claude-usage-tracker" | grep -q "arm64" || \
            (echo "ERROR: arm64 slice missing from claude-usage-tracker" && exit 1)
          lipo -info "${STAGING_DIR}/claude-usage-tracker" | grep -q "x86_64" || \
            (echo "ERROR: x86_64 slice missing from claude-usage-tracker" && exit 1)
          lipo -info "${STAGING_DIR}/heimdall-hook" | grep -q "arm64" || \
            (echo "ERROR: arm64 slice missing from heimdall-hook" && exit 1)
          lipo -info "${STAGING_DIR}/heimdall-hook" | grep -q "x86_64" || \
            (echo "ERROR: x86_64 slice missing from heimdall-hook" && exit 1)

      - name: Package universal tarball
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          STAGING_DIR="heimdall-${VERSION}-universal-apple-darwin"
          ARCHIVE_NAME="heimdall-${VERSION}-universal-apple-darwin.tar.gz"

          tar czf "${ARCHIVE_NAME}" "${STAGING_DIR}"
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload universal tarball to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256

  consolidate-checksums:
    name: Consolidate SHA256SUMS
    needs: [build, macos-app, macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all release assets
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05  # v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*.sha256"
          out-file-path: "checksums"

      - name: Merge into SHA256SUMS.txt
        run: |
          cat checksums/*.sha256 | sort > SHA256SUMS.txt
          echo "Contents of SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: SHA256SUMS.txt
