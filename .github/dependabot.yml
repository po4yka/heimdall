version: 2
updates:
  # ── Rust (cargo) ──────────────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "05:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      cargo-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ── Node (npm) ────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "05:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      npm-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ── GitHub Actions (workflow pins) ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "05:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      actions-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch
